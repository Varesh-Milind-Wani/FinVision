<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="Advanced Expense Tracker - Manage your finances effectively"
    />
    <meta name="color-scheme" content="light" />
    <style>
      html, body { height: 100%; background: #F8FAFC; color-scheme: light; }
    </style>
    <script>
      (function () {
        try {
          var setThemeColor = function (hex) {
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', hex);
          };

          var safeParse = function (text) {
            if (!text || typeof text !== 'string') return null;
            try {
              return JSON.parse(text);
            } catch (e) {
              return null;
            }
          };

          var getSessionUserId = function () {
            var rawSession = window.localStorage && window.localStorage.getItem('finvision.auth.session.v1');
            var session = safeParse(rawSession);
            return session && typeof session.userId === 'string' && session.userId ? session.userId : 'guest';
          };

          var readDarkPref = function () {
            if (!window.localStorage) return null;
            var userId = getSessionUserId();
            var keys = ['expenseTrackerData:' + userId, 'expenseTrackerData:guest', 'expenseTrackerData'];
            for (var i = 0; i < keys.length; i++) {
              var raw = window.localStorage.getItem(keys[i]);
              var stored = safeParse(raw);
              if (stored && typeof stored.darkMode === 'boolean') return stored.darkMode;
            }
            return null;
          };

          // IMPORTANT: Match the app’s behavior to avoid theme “flashes” on refresh.
          // This app defaults to light mode unless the user explicitly enabled dark mode.
          document.documentElement.style.colorScheme = 'light';
          document.documentElement.classList.remove('dark');
          setThemeColor('#ffffff');
        } catch (e) {
          // ignore
        }
      })();
    </script>
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>FinVision | Personal Finance</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <style>
        .boot-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color: #0f172a; }
        .boot-card { width: min(420px, 92vw); background: rgba(255,255,255,0.88); border-radius: 18px; box-shadow: 0 18px 45px rgba(15,23,42,0.10); border: 1px solid rgba(15,23,42,0.06); padding: 18px 18px; display:flex; align-items:center; gap: 14px; }
        .boot-spinner { width: 34px; height: 34px; border-radius: 999px; border: 3px solid rgba(15,23,42,0.10); border-top-color: rgba(99,102,241,0.95); animation: bootSpin 0.9s linear infinite; flex: 0 0 auto; }
        .boot-title { font-weight: 700; letter-spacing: -0.01em; font-size: 14px; line-height: 20px; }
        .boot-sub { margin-top: 2px; font-size: 12px; line-height: 18px; color: rgba(15,23,42,0.62); }
        @keyframes bootSpin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) { .boot-spinner { animation: none; } }
      </style>
      <div class="boot-wrap" aria-busy="true" aria-live="polite">
        <div class="boot-card">
          <div class="boot-spinner" aria-hidden="true"></div>
          <div>
            <div class="boot-title">Loading FinVision</div>
            <div class="boot-sub">Preparing your dashboard…</div>
          </div>
        </div>
      </div>
    </div>
